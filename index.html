<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saudades...</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url("foto.png") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      color: white;
      box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    p {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .counter {
      font-size: 2.3rem;
      font-weight: bold;
      margin: 20px 0;
      color: #ffb6c1;
      text-shadow: 0px 0px 10px rgba(255, 182, 193, 0.8);
    }

    .subtext {
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    button, a {
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    .btn-surpresa {
      background: #ff5c8a;
      color: white;
      box-shadow: 0px 0px 20px rgba(255, 92, 138, 0.5);
    }

    .btn-surpresa:hover {
      transform: scale(1.05);
      background: #ff2f73;
    }

    .btn-spotify {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-spotify:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.35);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-content {
      background: white;
      color: black;
      padding: 25px;
      border-radius: 18px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.5);
      animation: pop 0.3s ease-in-out;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .modal-content h2 {
      color: #ff2f73;
      margin-bottom: 10px;
      font-size: 1.5rem;
    }

    .modal-content p {
      font-size: 1rem;
      margin-bottom: 20px;
      color: #222;
    }

    .close-btn {
      background: #ff2f73;
      color: white;
      padding: 10px;
      width: 100%;
      border-radius: 12px;
      font-weight: bold;
    }

    .close-btn:hover {
      background: #d91e5b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>💌 Saudade de você...</h1>
    <p>Já faz um tempinho né...</p>

    <div class="counter" id="dias">0 dias</div>
    <div class="subtext">desde a última vez que a gente se viu 😔</div>

    <div class="buttons">
      <button class="btn-surpresa" onclick="abrirModal()">🎁 Surpresa</button>

      <a class="btn-spotify"
        href="https://open.spotify.com/track/0HWYFn8L5lLLz9zKGnga5h?si=aZAVmWOPREmigxlMh-_7ZQ"
        target="_blank">
        🎵 Ouvir nossa música
      </a>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>❤️ Pra você...</h2>
      <p>
        Perdão por não ter ido aquele dia, quando vamo se ver dnv? To ansioso…
      </p>
      <button class="close-btn" onclick="fecharModal()">Fechar</button>
    </div>
  </div>

  <script>
    
    const ultimaVez = new Date("2025-12-23"); 

    function atualizarDias() {
      const hoje = new Date();
      const diferenca = hoje - ultimaVez;
      const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

      document.getElementById("dias").innerText =
        dias + (dias === 1 ? " dia" : " dias");
    }

    atualizarDias();

    function abrirModal() {
      document.getElementById("modal").style.display = "flex";
    }

    function fecharModal() {
      document.getElementById("modal").style.display = "none";
    }

    // Fechar clicando fora
    window.addEventListener("click", function (e) {
      const modal = document.getElementById("modal");
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });
  </script>
</body>
</html>
